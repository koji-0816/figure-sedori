<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>フィギュアせどり判定プロトタイプ</title>
<link rel="stylesheet" href="/style.css">
</head>
<body>
<header>
  <h1>フィギュアせどり判定プロトタイプ</h1>
  <p class="note">ヤフオク検索結果を自動取得し、買取価格を入力すると利益見込みを自動判定します。</p>
</header>

<section class="search-bar">
  <input type="text" id="keyword" placeholder="例: 一番くじ ワンピース" />
  <button id="searchBtn">検索</button>
  <span id="status"></span>
</section>

<section id="resultArea"></section>

<template id="rowTemplate">
  <tr>
    <td class="col-image"><img class="thumb" /></td>
    <td class="col-title"><a class="titleLink" target="_blank" rel="noopener"></a></td>
    <td class="col-price"></td>
    <td class="col-postage"></td>
    <td class="col-time"></td>
    <td class="col-ai"><button class="aiBtn">AI確認</button></td>
    <td class="col-buyback"><input type="number" class="buybackInput" placeholder="買取価格" min="0" /></td>
    <td class="col-estimate"></td>
    <td class="col-judge"></td>
  </tr>
  <tr class="aiRow" hidden>
    <td colspan="9" class="aiResult"></td>
  </tr>
</template>

<template id="candidateTemplate">
  <div class="candidateCard">
    <div class="candidateLabel"></div>
    <dl>
      <dt>作品名</dt><dd class="c-work"></dd>
      <dt>キャラ名</dt><dd class="c-character"></dd>
      <dt>メーカー</dt><dd class="c-maker"></dd>
      <dt>シリーズ</dt><dd class="c-series"></dd>
      <dt>賞/版</dt><dd class="c-grade"></dd>
      <dt>検索キーワード</dt><dd class="c-keyword"></dd>
      <dt>確度</dt><dd class="c-confidence"></dd>
      <dt>要確認ポイント</dt><dd class="c-caveats"></dd>
    </dl>
  </div>
</template>

<script src="/app.js"></script>
</body>
</html>
